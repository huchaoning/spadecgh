name: deploy-docs

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "docs/**"
      - "!docs/temp/**"
      - ".github/workflows/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3"

      - run: pip install mkdocs
      - run: mkdocs build

      - name: deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: docs
          keep_files: true
          user_name: ${{ secrets.GH_PAGES_USER_NAME }}
          user_email: ${{ secrets.GH_PAGES_USER_EMAIL }}


