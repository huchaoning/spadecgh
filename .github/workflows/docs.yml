name: deploy-docs

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "docs/**"
      - "!docs/temp/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3"

      - run: pip install mkdocs
      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deploy
