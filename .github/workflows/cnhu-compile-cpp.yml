name: cnhu-compile-cpp

permissions:
  contents: write

on:
  push:
    paths:
      - 'src/hduq/cnhu/cgh/**'
      - '.github/workflows/cnhu-compile-cpp.yml'
  workflow_dispatch:

jobs:
  build:
    name: build native on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install just
        uses: taiki-e/install-action@just

      - name: setup compiler (windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: build native library
        run: |
          cd src/hduq/cnhu/cgh
          just build

      - name: list build output
        shell: bash
        run: |
          ls -R src/hduq/cnhu/cgh || true

      - name: collect artifacts
        run: |
          python -c "import os, shutil; os.makedirs('dist-bin/${{ runner.os }}', exist_ok=True); [shutil.copy(os.path.join('src/hduq/cnhu/cgh/lib', f), 'dist-bin/${{ runner.os }}/') for f in os.listdir('src/hduq/cnhu/cgh/lib')]"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cnhu-binaries-${{ runner.os }}
          path: dist-bin/${{ runner.os }}/