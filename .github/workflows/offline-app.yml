name: release-offline-app

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "web_app/**"
      - "cpp/**"
      - ".github/workflows/**"

    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-offline-app:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            platform-name: win_x64
            artifact-path: |
              web_app/out/*.exe
              web_app/out/*.zip
          - os: ubuntu-22.04
            platform-name: linux_x64
            artifact-path: "web_app/out/*.AppImage"
          - os: macos-14
            platform-name: macos_universal
            artifact-path: |
              web_app/out/*.dmg
              web_app/out/*.zip

    steps:
      - uses: actions/checkout@v4

      - name: install just
        uses: taiki-e/install-action@just

      - name: setup emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.1
          emsdk-version: 5.0.5
          actions-cache-folder: 'emsdk-cache'

      - name: verify emscripten
        run: |
          emcc --version
          emcmake cmake --version

      - name: build wasm
        run: |
          mkdir -p cpp/build_wasm
          cd cpp/build_wasm 
          emcmake cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build .

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm ci
        run: just npm-ci

      - name: install libfuse2
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y libfuse2
  
      - name: package electron app
        run: just build-app

      - name: upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-${{ matrix.platform-name }}
          path: ${{ matrix.artifact-path }}

  create-release:
    needs: build-offline-app
    runs-on: ubuntu-latest
    steps:
      - name: download all electron artifacts
        uses: actions/download-artifact@v4
        with:
          path: electron-artifacts/

      - name: rename artifacts for release
        shell: bash
        run: |
          mkdir -p final-release/
          VERSION="${{ github.ref_name }}"

          tree electron-artifacts/

          mv electron-artifacts/electron-app-win_x64/*Setup*.exe "final-release/spadecgh-offline-app-win-x64-${VERSION}-installer.exe"
          mv electron-artifacts/electron-app-win_x64/*.zip "final-release/spadecgh-offline-app-win-x64-${VERSION}-portable.zip"

          mv electron-artifacts/electron-app-macos_universal/*.dmg "final-release/spadecgh-offline-app-macos-universal-${VERSION}-installer.dmg"
          mv electron-artifacts/electron-app-macos_universal/*.zip "final-release/spadecgh-offline-app-macos-universal-${VERSION}-portable.zip"

          mv electron-artifacts/electron-app-linux_x64/*.AppImage "final-release/spadecgh-offline-app-linux-x64-${VERSION}.AppImage"
          ls -l final-release/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: final-release/*
          draft: true
          prerelease: true